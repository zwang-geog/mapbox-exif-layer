<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RGB GeoTIFF demo — mapbox-exif-layer</title>
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    No npm or build step needed.
    Serve this directory with any local HTTP server, e.g.:
      npx serve .
      python -m http.server
    Then open http://localhost:3000 (or whichever port is shown).

    Drop your RGB/RGBA GeoTIFF (EPSG:4326, uint8 or uint16) into this folder
    and update the `source` path below.
  -->

  <script type="importmap">
  {
    "imports": {
      "geotiff":     "https://esm.sh/geotiff@3",
      "maplibre-gl": "https://esm.sh/maplibre-gl@5"
    }
  }
  </script>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/maplibre-gl/dist/maplibre-gl.css"
  />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }

    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font: 13px/1 sans-serif;
      padding: 6px 10px;
      border-radius: 4px;
    }

    #status {
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="controls">
    <label>
      Opacity
      <input id="opacity-slider" type="range" min="0" max="1" step="0.05" value="1" />
      <span id="opacity-value">1.00</span>
    </label>
    <span id="status">Loading…</span>
  </div>

  <script type="module">
    import maplibregl from 'maplibre-gl';
    import RgbGeoTiff from '/src/RgbGeoTiff.js';

    // -----------------------------------------------------------------
    // Replace with the path to your own RGB GeoTIFF file.
    // The file must use EPSG:4326 and uint8 or uint16 bands.
    // -----------------------------------------------------------------
    const GEOTIFF_SOURCE = 'sample.tif';

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/dark',
      zoom: 7,
      center: [-119.699944, 34.432546]
    });

    const layer = new RgbGeoTiff({
      id: 'rgb-photo',
      source: GEOTIFF_SOURCE,
      opacity: 1.0,
    });

    map.on('load', () => {
      layer.addTo(map);
      document.getElementById('status').textContent = 'Layer added — fetching GeoTIFF…';

      // Fit to layer bounds once the source appears on the map
      const waitForSource = setInterval(() => {
        const source = map.getSource('rgb-photo-rgb-source');
        if (source) {
          clearInterval(waitForSource);
          document.getElementById('status').textContent = 'Ready';
          const coords = source.coordinates;
          const bounds = [
            [coords[0][0], coords[2][1]], // [west, south]
            [coords[1][0], coords[0][1]], // [east, north]
          ];
          map.fitBounds(bounds, { padding: 40, duration: 800 });
        }
      }, 200);
    });

    // Opacity slider
    const slider = document.getElementById('opacity-slider');
    const opacityLabel = document.getElementById('opacity-value');

    slider.addEventListener('input', () => {
      const value = parseFloat(slider.value);
      opacityLabel.textContent = value.toFixed(2);
      if (map.getLayer('rgb-photo')) {
        map.setPaintProperty('rgb-photo', 'raster-opacity', value);
      }
    });
  </script>
</body>
</html>
